; ============================================================
; Pomodoro CYD — ESP32-2432S028R (Cheap Yellow Display 2.8")
; LVGL 9 via esp32_smartdisplay + Improv Wi-Fi + portail web
; ============================================================

[platformio]
default_envs = esp32-2432S028R
; Les définitions de carte (boards/*.json) proviennent de
; https://github.com/rzeldent/platformio-espressif32-sunton

[env]
platform = espressif32@^6.9.0
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder
board_build.partitions = huge_app.csv

build_flags =
    -Ofast
    '-D BOARD_NAME="${this.board}"'
    ; Important : pas de logs sur Serial, le port est utilisé par Improv
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_NONE'
    '-D LV_CONF_PATH=${platformio.include_dir}/lv_conf.h'
    '-D FIRMWARE_NAME="Pomodoro CYD"'
    '-D FIRMWARE_VERSION="1.0.0"'

lib_deps =
    rzeldent/esp32_smartdisplay@^2.1.0

[env:esp32-2432S028R]
board = esp32-2432S028R

; Variante avec 2 ports USB (micro + USB-C), couleurs inversées
[env:esp32-2432S028Rv2]
board = esp32-2432S028Rv2

[env:esp32-2432S028Rv3]
board = esp32-2432S028Rv3
